<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>the betahuman planner</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #070e1c;
      color: #c8a96e;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      min-height: 100vh;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; background: #c8a96e44; cursor: pointer; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: #c8a96e; cursor: pointer; box-shadow: 0 0 10px #c8a96e66; transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .field {
      background: #070e1c; border: 1px solid #c8a96e55; border-radius: 5px;
      color: #f0ead8; font-family: monospace; padding: 5px 8px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
    }
    .field:focus { border-color: #c8a96e; box-shadow: 0 0 0 2px #c8a96e22; }
    .phase-name-field {
      background: transparent; border: none; border-bottom: 1px solid currentColor;
      border-radius: 0; padding: 2px 0;
    }
    .phase-name-field:focus { box-shadow: none; }
    button { cursor: pointer; transition: all 0.15s; font-family: monospace; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #060d14; }
    ::-webkit-scrollbar-thumb { background: #c8a96e55; border-radius: 3px; }
    .section-tag {
      font-size: 10px; letter-spacing: 0.2em; color: #c8a96e;
      font-family: monospace; margin-bottom: 10px; text-transform: uppercase;
    }
    .card { border-radius: 12px; padding: 22px 24px; }
    .kpi-val { font-family: monospace; font-weight: 700; letter-spacing: -0.02em; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
    .cpf-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #94b8d4; font-family: monospace; font-size: 11px;
      text-decoration: none; padding: 5px 10px;
      border: 1px solid #94b8d444; border-radius: 5px; background: #94b8d40a;
      transition: background 0.2s, border-color 0.2s;
    }
    .cpf-link:hover { background: #94b8d418; border-color: #94b8d488; }
    .cpf-section {
      background: #070f18; border: 1px solid #94b8d422;
      border-left: 3px solid #94b8d4; border-radius: 10px; padding: 16px 18px; margin-top: 14px;
    }
    .connector {
      display: flex; align-items: center; justify-content: center;
      padding: 18px 0 14px; gap: 14px;
    }
    .connector-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #c8a96e44, transparent); }
    .connector-pill {
      font-family: monospace; font-size: 10px; color: #c8a96e;
      letter-spacing: 0.15em; border: 1px solid #c8a96e55;
      border-radius: 20px; padding: 5px 16px; white-space: nowrap;
    }
    .input-cell {
      background: #0a0f0a; border-radius: 9px; padding: 12px 14px;
    }
    .input-label {
      font-size: 10px; color: #c8a96e; font-family: monospace;
      letter-spacing: 0.1em; margin-bottom: 6px; text-transform: uppercase;
    }
    .input-hint {
      font-size: 10px; color: #c8a96e; font-family: monospace; margin-top: 5px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
  const { useState, useMemo, useCallback } = React;
  const {
    AreaChart, Area, BarChart, Bar, Cell, Line,
    XAxis, YAxis, CartesianGrid, Tooltip,
    ResponsiveContainer, ReferenceLine, ComposedChart
  } = Recharts;

  // ── PALETTE ──────────────────────────────────────────────────────────────────
  const GOLD     = "#c8a96e";
  const CREAM    = "#f0ead8";
  const PLATINUM = "#94b8d4";
  const NAVY_CARD= "#0c1a2e";
  const NAVY_DEEP= "#080c04";
  const DIM      = "#8a7a5a";
  const TAUPE    = "#b0a080";
  const G_GREEN  = "#34d399";
  const G_AMBER  = "#fbbf24";
  const G_RED    = "#f87171";

  const PHASE_COLORS = ["#38bdf8","#fbbf24","#34d399","#a78bfa","#fb923c","#f87171","#e879f9","#22d3ee","#4ade80","#f472b6"];

  const DEFAULT_PHASES = [
    { id:1, name:"Early Family",    startYr:2035, endYr:2044, real:150000, color:"#38bdf8" },
    { id:2, name:"Education Spike", startYr:2045, endYr:2052, real:200000, color:"#fbbf24" },
    { id:3, name:"Late Family",     startYr:2053, endYr:2055, real:150000, color:"#34d399" },
    { id:4, name:"Freedom Couple",  startYr:2056, endYr:2064, real:120000, color:"#a78bfa" },
    { id:5, name:"Early Health",    startYr:2065, endYr:2072, real:120000, color:"#fb923c" },
    { id:6, name:"Late Health",     startYr:2073, endYr:2080, real:200000, color:"#f87171" },
  ];

  // ── DRAWDOWN MATH ────────────────────────────────────────────────────────────
  function getPhase(yr, phases) { return phases.find(p => yr >= p.startYr && yr <= p.endYr); }

  function simulate(startCap, phases, gr, inf, startYr, endYr, birthYr, cpfMonthly, cpfStartAge, lumpSum55) {
    const rows = [], cpfStartYear = birthYr + cpfStartAge, lump55Year = birthYr + 55;
    let bal = startCap;
    for (let yr = startYr; yr <= endYr; yr++) {
      const ph = getPhase(yr, phases);
      const nomDraw = ph ? ph.real * Math.pow(1 + inf, yr - 2026) : 0;
      const cpfIncome = yr >= cpfStartYear ? cpfMonthly * 12 : 0;
      const netDraw = Math.max(0, nomDraw - cpfIncome);
      bal = bal * (1 + gr);
      const lumpThisYear = (yr === lump55Year && lumpSum55 > 0) ? lumpSum55 : 0;
      if (lumpThisYear > 0) bal += lumpThisYear;
      bal -= netDraw;
      rows.push({
        year: yr, balance: Math.max(0, Math.round(bal)),
        withdrawal: Math.round(nomDraw), netWithdrawal: Math.round(netDraw),
        cpfIncome: Math.round(cpfIncome), phase: ph?.name ?? "",
        phColor: ph?.color ?? "#1e293b", depleted: bal <= 0,
        isCpfStart: yr === cpfStartYear, isLump55: lumpThisYear > 0,
      });
      if (bal <= 0) break;
    }
    return rows;
  }

  function findIdeal(phases, gr, inf, startYr, endYr, target, birthYr, cpfMonthly, cpfStartAge, lumpSum55) {
    if (!phases.length) return 0;
    let lo = 1_000, hi = 100_000_000;
    for (let i = 0; i < 90; i++) {
      const mid = (lo + hi) / 2;
      const rows = simulate(mid, phases, gr, inf, startYr, endYr, birthYr, cpfMonthly, cpfStartAge, lumpSum55);
      const ok = rows.length === endYr - startYr + 1;
      const last = ok ? rows[rows.length - 1].balance : -1;
      if (last < target) lo = mid; else hi = mid;
    }
    return Math.ceil((lo + hi) / 2 / 10_000) * 10_000;
  }

  // ── ACCUMULATION MATH ────────────────────────────────────────────────────────
  function buildAccumulation(current, monthly, gr, fromYr, toYr, magic) {
    const rows = [], mr = gr / 12;
    let bal = current, hitYear = null;
    for (let yr = fromYr; yr <= toYr + 30 && yr <= fromYr + 60; yr++) {
      for (let m = 0; m < 12; m++) bal = bal * (1 + mr) + monthly;
      if (bal >= magic && !hitYear) hitYear = yr;
      rows.push({ year: yr, portfolio: Math.round(bal), target: Math.round(magic) });
      if (yr > toYr + 5 && bal >= magic) break;
    }
    return { rows, hitYear };
  }

  // ── FORMAT ───────────────────────────────────────────────────────────────────
  function fmt(n, dp = 2) {
    if (!isFinite(n) || n === null) return "—";
    const a = Math.abs(n);
    if (a >= 1_000_000) return `$${(n / 1_000_000).toFixed(dp)}M`;
    if (a >= 1_000)     return `$${Math.round(n).toLocaleString()}`;
    return `$${Math.round(n)}`;
  }

  // ── TOOLTIP ──────────────────────────────────────────────────────────────────
  function ChartTip({ active, payload, label }) {
    if (!active || !payload?.length) return null;
    return (
      <div style={{ background:"#0c1a2e", border:`1px solid ${GOLD}44`, borderRadius:8, padding:"10px 14px", fontSize:12, minWidth:200 }}>
        <div style={{ color:DIM, fontFamily:"monospace", marginBottom:6 }}>{label}</div>
        {payload.map((p, i) => (p.value ?? 0) > 0 && (
          <div key={i} style={{ display:"flex", justifyContent:"space-between", gap:16, color:p.color||GOLD, marginBottom:2 }}>
            <span>{p.name}</span>
            <span style={{ fontFamily:"monospace", fontWeight:700 }}>{fmt(p.value)}</span>
          </div>
        ))}
      </div>
    );
  }

  // ── PHASE CARD ────────────────────────────────────────────────────────────────
  function PhaseCard({ p, inf, onUpdate, onRemove, canRemove }) {
    const nomFirst = p.real * Math.pow(1 + inf, p.startYr - 2026);
    const nomLast  = p.real * Math.pow(1 + inf, p.endYr - 2026);
    const yrs = Math.max(0, p.endYr - p.startYr + 1);
    return (
      <div className="fade-in" style={{
        background:"#080f0a", border:`1px solid ${p.color}25`,
        borderLeft:`3px solid ${p.color}`, borderRadius:11, padding:"16px",
        display:"flex", flexDirection:"column", gap:10
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <input className="field phase-name-field" value={p.name}
            style={{ color:p.color, fontSize:13, fontWeight:700, width:"75%" }}
            onChange={e => onUpdate("name", e.target.value)} />
          {canRemove && (
            <button onClick={onRemove} style={{
              background:"transparent", border:`1px solid ${GOLD}33`,
              color:DIM, borderRadius:4, padding:"2px 8px", fontSize:11
            }}>✕</button>
          )}
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <div style={{ flex:1 }}>
            <div className="input-label">FROM</div>
            <input type="number" className="field" value={p.startYr} min={2020} max={2120} step={1}
              style={{ fontSize:14, fontWeight:600 }} onChange={e => onUpdate("startYr", +e.target.value)} />
          </div>
          <div style={{ color:GOLD, fontSize:16, marginTop:18, flexShrink:0 }}>→</div>
          <div style={{ flex:1 }}>
            <div className="input-label">TO</div>
            <input type="number" className="field" value={p.endYr} min={2020} max={2120} step={1}
              style={{ fontSize:14, fontWeight:600 }} onChange={e => onUpdate("endYr", +e.target.value)} />
          </div>
          <div style={{ color:GOLD, fontSize:10, fontFamily:"monospace", marginTop:18, flexShrink:0 }}>{yrs}yr</div>
        </div>
        <div>
          <div className="input-label">REAL DRAWDOWN / YR (2026 SGD)</div>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ color:GOLD, fontFamily:"monospace", fontSize:16, flexShrink:0 }}>$</span>
            <input type="number" className="field" value={p.real / 1000} min={0} step={10}
              style={{ fontSize:20, fontWeight:700, color:p.color }}
              onChange={e => onUpdate("real", +e.target.value * 1000)} />
            <span style={{ color:DIM, fontFamily:"monospace", fontSize:13, flexShrink:0 }}>k</span>
          </div>
        </div>
        <div style={{ fontSize:10, color:DIM, fontFamily:"monospace", lineHeight:1.5 }}>
          Actual spend: {fmt(nomFirst, 1)} in {p.startYr} → {fmt(nomLast, 1)} by {p.endYr}
        </div>
      </div>
    );
  }

  // ── APP ───────────────────────────────────────────────────────────────────────
  function App() {
    // model settings
    const [growth, setGrowth]       = useState(6.0);
    const [inflation, setInflation] = useState(2.7);
    const [startYear, setStartYear] = useState(2035);
    const [endYear, setEndYear]     = useState(2080);
    const [birthYear, setBirthYear] = useState(1980);
    const [target, setTarget]       = useState(1_000_000);
    const [phases, setPhases]       = useState(DEFAULT_PHASES);

    // CPF
    const [cpfMonthly, setCpfMonthly]   = useState(0);
    const [cpfStartAge, setCpfStartAge] = useState(65);
    const [lumpSum55, setLumpSum55]     = useState(0);

    // accumulation
    const [accPortfolio, setAccPortfolio] = useState(1_000_000);
    const [accMonthly, setAccMonthly]     = useState(5_000);
    const [accGrowth, setAccGrowth]       = useState(6.0);
    const ACC_YEAR = 2026;

    // what-if slider (lives inside §3)
    const [capOverride, setCapOverride] = useState(null);

    const gr  = growth    / 100;
    const inf = inflation / 100;

    const idealCap = useMemo(() =>
      findIdeal(phases, gr, inf, startYear, endYear, target, birthYear, cpfMonthly, cpfStartAge, lumpSum55),
      [phases, gr, inf, startYear, endYear, target, birthYear, cpfMonthly, cpfStartAge, lumpSum55]
    );

    const displayCap = capOverride ?? idealCap;
    const sliderMin  = Math.max(100_000,    idealCap * 0.5);
    const sliderMax  = Math.max(20_000_000, idealCap * 1.6);

    const data = useMemo(() =>
      simulate(displayCap, phases, gr, inf, startYear, endYear, birthYear, cpfMonthly, cpfStartAge, lumpSum55),
      [displayCap, phases, gr, inf, startYear, endYear, birthYear, cpfMonthly, cpfStartAge, lumpSum55]
    );

    const { rows: accRows, hitYear } = useMemo(() =>
      buildAccumulation(accPortfolio, accMonthly, accGrowth / 100, ACC_YEAR, startYear, idealCap),
      [accPortfolio, accMonthly, accGrowth, startYear, idealCap]
    );

    const complete    = data.length === endYear - startYear + 1;
    const finalBal    = complete ? data[data.length - 1].balance : 0;
    const depleted    = !complete;
    const depYear     = depleted ? (data[data.length - 1]?.year ?? "?") : null;
    const peakRow     = data.reduce((b, d) => d.balance > b.balance ? d : b, data[0] ?? { balance:0, year:startYear });
    const totalDrawn  = data.reduce((s, d) => s + d.netWithdrawal, 0);
    const totalCpf    = data.reduce((s, d) => s + d.cpfIncome, 0);
    const hasCpf      = cpfMonthly > 0;
    const hasLump     = lumpSum55 > 0;
    const cpfStartYear = birthYear + cpfStartAge;
    const lump55Year   = birthYear + 55;

    const yearsToGoal     = hitYear ? hitYear - ACC_YEAR : null;
    const onTrack         = hitYear !== null && hitYear <= startYear;
    const currentAtStart  = accRows.find(r => r.year === startYear)?.portfolio ?? 0;
    const shortfall       = idealCap - currentAtStart;

    const drawdownStatus = depleted
      ? { txt:`⚠ Depleted ${depYear}`, col:G_RED }
      : finalBal >= target
      ? { txt:`✓ Ends ${fmt(finalBal)}`, col:G_GREEN }
      : { txt:`⚠ Ends ${fmt(finalBal)} — below $${(target/1e6).toFixed(1)}M target`, col:G_AMBER };

    const milestones = data.filter(d =>
      d.year === startYear || d.year === endYear || (d.year - startYear) % 4 === 0
    );

    const updatePhase = useCallback((id, field, val) => {
      setPhases(ps => ps.map(p => p.id === id ? { ...p, [field]: val } : p));
      setCapOverride(null);
    }, []);
    const removePhase = useCallback((id) => {
      setPhases(ps => ps.filter(p => p.id !== id));
      setCapOverride(null);
    }, []);
    const addPhase = useCallback(() => {
      const last = phases[phases.length - 1];
      const color = PHASE_COLORS[phases.length % PHASE_COLORS.length];
      setPhases(ps => [...ps, {
        id: Date.now(), name: `Phase ${ps.length + 1}`,
        startYr: last ? last.endYr + 1 : startYear,
        endYr:   last ? last.endYr + 6 : startYear + 5,
        real: 250_000, color
      }]);
      setCapOverride(null);
    }, [phases, startYear]);

    const settingCell = (label, input, hint) => (
      <div className="input-cell">
        <div className="input-label">{label}</div>
        {input}
        {hint && <div className="input-hint">{hint}</div>}
      </div>
    );

    return (
      <div style={{ maxWidth:1080, margin:"0 auto", padding:"40px 24px 60px" }}>

        {/* ── HEADER ── */}
        <div style={{ marginBottom:36 }}>
          <div style={{ fontSize:10, letterSpacing:"0.28em", color:GOLD, fontFamily:"monospace", marginBottom:8 }}>
            THE BETAHUMAN · NOT FINANCIAL ADVICE · SGD
          </div>
          <h1 style={{ fontSize:36, fontWeight:700, color:CREAM, letterSpacing:"-0.02em", marginBottom:6 }}>
            Financial Freedom Planner
          </h1>
          <p style={{ color:GOLD, fontSize:13, fontStyle:"italic" }}>
            Set your retirement parameters → discover your magic number → track your path → plan the life after
          </p>
        </div>

        {/* ════════════════════════════════════════════════════════════════════
            § 1 — MODEL SETTINGS + CPF
        ════════════════════════════════════════════════════════════════════ */}
        <div className="card" style={{ background:NAVY_CARD, border:`1px solid ${GOLD}33`, marginBottom:0 }}>
          <div className="section-tag">§ 1 — Your Retirement Parameters</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10, marginBottom:10 }}>

            {settingCell("GROWTH RATE (% P.A.)",
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <input type="number" className="field" value={growth} step={0.1} min={0.1} max={30}
                  style={{ fontSize:20, fontWeight:700, color:G_GREEN }}
                  onChange={e => { setGrowth(+e.target.value); setCapOverride(null); }} />
                <span style={{ color:DIM, fontFamily:"monospace" }}>%</span>
              </div>
            )}

            {settingCell("INFLATION (% P.A.)",
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <input type="number" className="field" value={inflation} step={0.1} min={0} max={20}
                  style={{ fontSize:20, fontWeight:700, color:"#fb923c" }}
                  onChange={e => { setInflation(+e.target.value); setCapOverride(null); }} />
                <span style={{ color:DIM, fontFamily:"monospace" }}>%</span>
              </div>,
              `Real net return: ${(growth - inflation).toFixed(1)}% p.a.`
            )}

            {settingCell("BIRTH YEAR",
              <input type="number" className="field" value={birthYear} step={1} min={1940} max={2010}
                style={{ fontSize:20, fontWeight:700, color:"#e879f9" }}
                onChange={e => setBirthYear(Math.round(+e.target.value)) } />,
              `Age at retirement: ${startYear - birthYear}`
            )}

            {settingCell("RETIREMENT START YEAR",
              <input type="number" className="field" value={startYear} step={1} min={2024} max={2080}
                style={{ fontSize:20, fontWeight:700, color:G_GREEN }}
                onChange={e => { setStartYear(Math.round(+e.target.value)); setCapOverride(null); }} />
            )}

            {settingCell("PLAN END YEAR",
              <input type="number" className="field" value={endYear} step={1} min={2030} max={2150}
                style={{ fontSize:20, fontWeight:700, color:"#a78bfa" }}
                onChange={e => { setEndYear(Math.round(+e.target.value)); setCapOverride(null); }} />,
              `${endYear - startYear + 1} year plan · ${startYear} → ${endYear}`
            )}

            {settingCell("END BALANCE TARGET",
              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ color:GOLD, fontFamily:"monospace" }}>$</span>
                <input type="number" className="field" value={target / 1000} step={100} min={0}
                  style={{ fontSize:20, fontWeight:700, color:"#38bdf8" }}
                  onChange={e => { setTarget(+e.target.value * 1000); setCapOverride(null); }} />
                <span style={{ color:DIM, fontFamily:"monospace" }}>k</span>
              </div>,
              "What you want left at end year"
            )}
          </div>

          {/* CPF block */}
          <div className="cpf-section">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10, marginBottom:14 }}>
              <div>
                <div style={{ fontSize:10, color:PLATINUM, fontFamily:"monospace", letterSpacing:"0.18em", marginBottom:4, textTransform:"uppercase" }}>CPF Integration</div>
                <div style={{ fontSize:11, color:GOLD, lineHeight:1.6 }}>
                  CPF LIFE income offsets your portfolio drawdown · lump sum at 55 injects into your portfolio
                </div>
              </div>
              <a href="https://www.cpf.gov.sg/payoutestimator" target="_blank" rel="noopener noreferrer" className="cpf-link">
                <span>↗</span> CPF Payout Estimator
              </a>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
              <div style={{ background:"#040e1a", borderRadius:8, padding:"12px" }}>
                <div style={{ fontSize:10, color:PLATINUM, fontFamily:"monospace", letterSpacing:"0.1em", marginBottom:5, textTransform:"uppercase" }}>CPF LIFE Payout / Month</div>
                <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <span style={{ color:GOLD, fontFamily:"monospace", flexShrink:0 }}>$</span>
                  <input type="number" className="field" value={cpfMonthly} min={0} step={100}
                    style={{ fontSize:18, fontWeight:700, color:PLATINUM, border:`1px solid ${PLATINUM}44` }}
                    onChange={e => { setCpfMonthly(+e.target.value); setCapOverride(null); }} />
                </div>
                <div style={{ fontSize:10, color:GOLD, fontFamily:"monospace", marginTop:5 }}>combined both persons</div>
                {cpfMonthly > 0 && <div style={{ fontSize:10, color:PLATINUM, fontFamily:"monospace", marginTop:4 }}>= {fmt(cpfMonthly * 12)} / yr</div>}
              </div>
              <div style={{ background:"#040e1a", borderRadius:8, padding:"12px" }}>
                <div style={{ fontSize:10, color:PLATINUM, fontFamily:"monospace", letterSpacing:"0.1em", marginBottom:5, textTransform:"uppercase" }}>CPF LIFE Start Age</div>
                <input type="number" className="field" value={cpfStartAge} min={55} max={70} step={1}
                  style={{ fontSize:18, fontWeight:700, color:PLATINUM, border:`1px solid ${PLATINUM}44` }}

                               : d.balance > 10_000_000 ? G_GREEN : "#38bdf8"
                        }}>{fmt(d.balance)}</span>
                        {d.year === endYear && <span style={{ fontSize:10, color:`${GOLD}66`, marginLeft:6 }}>final</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* ── DOWNLOAD CSV ── */}
        <div style={{ display:"flex", justifyContent:"center", marginBottom:28 }}>
          <button
            onClick={() => {
              const esc = v => `"${String(v).replace(/"/g, '""')}"`;
              const rows = [];

              // ── SECTION 1: Settings snapshot ──
              rows.push(["BETAHUMAN FINANCIAL FREEDOM PLANNER — SETTINGS SNAPSHOT"]);
              rows.push(["Generated", new Date().toLocaleDateString("en-SG", { day:"2-digit", month:"short", year:"numeric" })]);
              rows.push([]);
              rows.push(["PARAMETER", "VALUE"]);
              rows.push(["Birth Year", birthYear]);
              rows.push(["Retirement Start Year", startYear]);
              rows.push(["Plan End Year", endYear]);
              rows.push(["Age at Retirement", startYear - birthYear]);
              rows.push(["Growth Rate (% p.a.)", `${growth}%`]);
              rows.push(["Inflation Rate (% p.a.)", `${inflation}%`]);
              rows.push(["Real Net Return (% p.a.)", `${(growth - inflation).toFixed(1)}%`]);
              rows.push(["End Balance Target", `$${target.toLocaleString()}`]);
              rows.push(["Ideal Starting Capital", `$${idealCap.toLocaleString()}`]);
              rows.push([]);
              rows.push(["CPF INTEGRATION"]);
              rows.push(["CPF LIFE Monthly Payout (combined)", cpfMonthly > 0 ? `$${cpfMonthly.toLocaleString()}` : "Not set"]);
              rows.push(["CPF LIFE Start Age", cpfStartAge]);
              rows.push(["CPF LIFE Start Year", birthYear + cpfStartAge]);
              rows.push(["Lump Sum at 55 (above FRS)", lumpSum55 > 0 ? `$${lumpSum55.toLocaleString()}` : "Not set"]);
              rows.push([]);
              rows.push(["ACCUMULATION PHASE"]);
              rows.push(["Current Portfolio (2026)", `$${accPortfolio.toLocaleString()}`]);
              rows.push(["Monthly Contribution", `$${accMonthly.toLocaleString()}`]);
              rows.push(["Accumulation Growth Rate", `${accGrowth}%`]);
              rows.push(["Projected Year to Hit Magic Number", hitYear ?? "Not reached"]);
              rows.push([]);

              // ── SECTION 2: Drawdown phases ──
              rows.push(["DRAWDOWN PHASES"]);
              rows.push(["Phase", "From", "To", "Real Draw/yr (2026 SGD)", "Nominal Draw at Start", "Nominal Draw at End"]);
              phases.forEach(p => {
                const nomFirst = (p.real * Math.pow(1 + inf, p.startYr - 2026)).toFixed(0);
                const nomLast  = (p.real * Math.pow(1 + inf, p.endYr  - 2026)).toFixed(0);
                rows.push([p.name, p.startYr, p.endYr, `$${p.real.toLocaleString()}`, `$${Number(nomFirst).toLocaleString()}`, `$${Number(nomLast).toLocaleString()}`]);
              });
              rows.push([]);

              // ── SECTION 3: Accumulation year-by-year ──
              rows.push(["ACCUMULATION · YEAR BY YEAR (2026 → RETIREMENT)"]);
              rows.push(["Year", "Age", "Portfolio Value", "Magic Number Target", "Gap to Target"]);
              accRows.forEach(r => {
                const age = r.year - birthYear;
                const gap = idealCap - r.portfolio;
                rows.push([r.year, age, `$${r.portfolio.toLocaleString()}`, `$${idealCap.toLocaleString()}`, gap > 0 ? `-$${gap.toLocaleString()}` : `+$${Math.abs(gap).toLocaleString()}`]);
              });
              rows.push([]);

              // ── SECTION 4: Drawdown year-by-year ──
              rows.push(["DRAWDOWN · YEAR BY YEAR (RETIREMENT → END)"]);
              rows.push(["Year", "Age", "Phase", "Gross Drawdown", "CPF LIFE Income", "Net Portfolio Draw", "Portfolio Balance", "Running Total Drawn"]);
              let runningTotal = 0;
              data.forEach(d => {
                runningTotal += d.netWithdrawal;
                const age = d.year - birthYear;
                rows.push([
                  d.year, age, d.phase || "—",
                  `$${d.withdrawal.toLocaleString()}`,
                  d.cpfIncome > 0 ? `$${d.cpfIncome.toLocaleString()}` : "—",
                  `$${d.netWithdrawal.toLocaleString()}`,
                  d.depleted ? "DEPLETED" : `$${d.balance.toLocaleString()}`,
                  `$${runningTotal.toLocaleString()}`
                ]);
              });
              rows.push([]);
              rows.push(["FOR ILLUSTRATIVE PURPOSES ONLY · NOT FINANCIAL ADVICE · THE BETAHUMAN"]);

              // Build CSV string
              const csv = rows.map(r => r.map(esc).join(",")).join("\n");
              const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
              const url  = URL.createObjectURL(blob);
              const a    = document.createElement("a");
              a.href     = url;
              a.download = `betahuman-plan-${new Date().toISOString().slice(0,10)}.csv`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            }}
            style={{
              display:"flex", alignItems:"center", gap:10,
              padding:"14px 32px", borderRadius:8,
              border:`1px solid ${GOLD}`,
              background:`linear-gradient(135deg, ${GOLD}18 0%, ${GOLD}08 100%)`,
              color:GOLD, fontSize:13, fontFamily:"monospace",
              letterSpacing:"0.12em", fontWeight:600,
              boxShadow:`0 0 20px ${GOLD}18`,
              transition:"all 0.2s"
            }}
            onMouseEnter={e => { e.currentTarget.style.background=`linear-gradient(135deg, ${GOLD}30 0%, ${GOLD}18 100%)`; e.currentTarget.style.boxShadow=`0 0 30px ${GOLD}33`; }}
            onMouseLeave={e => { e.currentTarget.style.background=`linear-gradient(135deg, ${GOLD}18 0%, ${GOLD}08 100%)`; e.currentTarget.style.boxShadow=`0 0 20px ${GOLD}18`; }}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            DOWNLOAD MY PLAN · CSV
          </button>
        </div>

        {/* FOOTER */}
        <div style={{ fontSize:10, color:`${GOLD}33`, fontFamily:"monospace", lineHeight:1.9, textAlign:"center", paddingTop:8, letterSpacing:"0.1em" }}>
          THE BETAHUMAN · APRIL 2026 · FOR ILLUSTRATIVE PURPOSES ONLY · NOT FINANCIAL ADVICE
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
